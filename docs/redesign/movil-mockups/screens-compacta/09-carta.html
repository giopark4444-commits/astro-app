<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Carta natal (compacta)</title>
<script>document.documentElement.dataset.theme=new URLSearchParams(location.search).get('theme')||'dark';</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400..700;1,400..700&family=Quicksand:wght@400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css?v=3">
<style>
  body{min-height:100vh;display:grid;place-items:center;background:var(--bg-deep);padding:24px}

  .content{ flex:1; display:flex; flex-direction:column; padding:6px 16px 0; gap:10px; overflow:hidden; }

  /* ——— cabecera ——— */
  .carta-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:10px; }
  .carta-head .stack{ display:flex; flex-direction:column; gap:2px; }
  .carta-head h1{ font:600 24px/1.1 var(--serif); color:var(--text); }

  .segmented{
    display:flex; flex:none; padding:3px; gap:2px; border-radius:var(--r-pill);
    border:1px solid var(--acc-hair); background:var(--panel-soft);
  }
  .seg{
    display:flex; align-items:center; justify-content:center; min-height:38px;
    padding:0 12px; border-radius:var(--r-pill); font:600 13px/1 var(--sans);
    letter-spacing:.3px; color:var(--text-faint);
  }
  .seg.on{
    background:linear-gradient(135deg, var(--acc), var(--acc-soft));
    color:var(--on-acc); box-shadow:0 2px 10px var(--acc-soft);
  }

  /* ——— la rueda ——— */
  .wheel-wrap{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .wheel-wrap svg{ width:328px; height:328px; display:block; }

  .zodiac-glyph{ font:15px/1 var(--serif); fill:var(--acc-text); text-anchor:middle; dominant-baseline:central; }
  .planet-glyph{ font:600 17px/1 var(--serif); fill:var(--text); text-anchor:middle; dominant-baseline:central; }
  .asc-label{ font:600 13px/1 var(--sans); fill:var(--text-dim); }

  .chips-row{ display:flex; gap:8px; width:100%; justify-content:center; flex-wrap:wrap; }
  .data-chip{
    flex:none; display:flex; align-items:center; justify-content:center; gap:6px;
    min-height:34px; padding:7px 14px; border-radius:var(--r-pill);
    border:1px solid var(--acc-hair); background:var(--panel-soft);
    font:600 15px/1 var(--sans); color:var(--text-dim); white-space:nowrap;
  }
  .data-chip .g{ color:var(--acc-text); font:15px/1 var(--serif); flex:none; }

  /* ——— posiciones ——— */
  .pos-sec{ display:flex; flex-direction:column; gap:6px; flex:1; min-height:0; }
  .card-pos{ padding:0; display:flex; flex-direction:column; }
  .pos-row{
    display:flex; align-items:center; gap:10px; min-height:44px; padding:0 14px;
    border-bottom:1px solid var(--acc-hair);
  }
  .pos-row:last-child{ border-bottom:0; }
  .pos-row .g{ color:var(--acc-text); font:15px/1 var(--serif); flex:none; width:18px; text-align:center; }
  .pos-row .txt{ flex:1; min-width:0; font:500 15px/1.3 var(--sans); color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pos-row .txt b{ font-weight:700; }
  .pos-row .txt span{ color:var(--text-faint); }
  .pos-row .chev{ font:600 15px/1 var(--serif); color:var(--acc-text); opacity:.85; flex:none; }

  /* ——— tab bar ——— */
  .tabbar{
    flex:none; display:flex; background:var(--bg-deep); border-top:1px solid var(--acc-hair);
    padding:10px 6px 4px;
  }
  .tab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    min-height:44px; justify-content:flex-start; color:var(--text-faint);
    font:600 13px/1 var(--sans);
  }
  .tab-icon{ position:relative; width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
  .tab.active{ color:var(--acc); }
  .tab.active .tab-icon::before{
    content:""; position:absolute; inset:-7px; border-radius:50%;
    background:var(--acc); opacity:.12;
  }
  .tab.active .tab-icon svg{ position:relative; }
</style>
