<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Compatibilidad — selección</title>
<script>document.documentElement.dataset.theme=new URLSearchParams(location.search).get('theme')||'dark';</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400..700;1,400..700&family=Quicksand:wght@400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css?v=3">
<style>
body{min-height:100vh;display:grid;place-items:center;background:var(--bg-deep);padding:24px}

.push-header{
  flex:none; display:flex; align-items:center; padding:0 8px 4px;
}
.back-btn{
  width:44px; height:44px; flex:none; display:flex; align-items:center; justify-content:center;
  background:none; border:0; color:var(--text); padding:0;
}
.push-header .eyebrow{ flex:1; text-align:center; margin-right:44px; }

main{
  flex:1; display:flex; flex-direction:column; gap:12px;
  padding:10px 16px 16px; overflow:hidden;
}

.titulo-acto{ display:flex; flex-direction:column; gap:4px; }
.h-serif--title{ font:600 22px/1.2 var(--serif); color:var(--text); }

.franja{
  background:var(--acc-faint); border-radius:var(--r-md);
  padding:12px; display:flex; flex-direction:column; gap:8px;
}
.franja-label{
  text-transform:uppercase; letter-spacing:1px; color:var(--acc-text);
}
.franja-fila{
  display:flex; gap:8px; flex-wrap:wrap; align-items:center;
}

.avatar-ini{
  width:32px; height:32px; border-radius:50%; flex:none;
  display:flex; align-items:center; justify-content:center;
  font:700 13px/1 var(--sans);
}
.avatar-ini--on{
  background:rgba(7,10,28,0.15); border:1.5px solid var(--on-acc); color:var(--on-acc);
}
.avatar-ini--off{
  background:var(--panel); border:1.5px solid var(--acc-hair); color:var(--acc-text);
}

.chip--dashed{
  border-style:dashed; border-color:var(--acc-hair); color:var(--acc-text); background:transparent;
}

.separador-puente{ margin:0 30px; }
.separador-puente .glifo{
  font:18px/1 var(--serif); color:var(--acc-text); flex:none;
}

.vinculos{ display:flex; flex-direction:column; gap:8px; }
.vinculos-rows{ display:flex; flex-direction:column; gap:8px; }
.vinculo-row{
  min-height:56px; width:100%; display:flex; align-items:center; justify-content:space-between;
  gap:10px; padding:0 12px; background:var(--glass); border:1px solid var(--acc-hair);
  border-radius:var(--r-md); text-align:left; font-family:var(--sans);
}
.vinculo-info{ display:flex; flex-direction:column; gap:2px; min-width:0; }
.vinculo-nombres{ font:600 15px/1.25 var(--sans); color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.vinculo-nombres b{ color:var(--acc-text); font-weight:700; }
.vinculo-meta{ font:500 13px/1.3 var(--sans); color:var(--text-faint); }
.vinculo-score{ font:700 22px/1 var(--serif); color:var(--acc-text); flex:none; }

.cierre{ display:flex; flex-direction:column; gap:8px; }
.nota-cierre{ text-align:center; line-height:1.6; }
.cierre .cta{ width:100%; }
</style>
</head><body>
<div class="phone">

  <div class="stars">
    <i style="top:6%;left:12%"></i><i style="top:9%;left:78%"></i><i style="top:4%;left:45%"></i>
    <i style="top:13%;left:24%"></i><i style="top:11%;left:62%"></i><i style="top:16%;left:88%"></i>
    <i style="top:8%;left:33%"></i><i style="top:19%;left:8%"></i><i style="top:15%;left:52%"></i>
    <i style="top:22%;left:70%"></i><i style="top:5%;left:92%"></i><i style="top:27%;left:18%"></i>
    <i style="top:24%;left:40%"></i><i style="top:30%;left:85%"></i><i style="top:12%;left:5%"></i>
    <i style="top:33%;left:58%"></i><i style="top:7%;left:66%"></i><i style="top:20%;left:96%"></i>
    <i style="top:2%;left:20%"></i><i style="top:29%;left:30%"></i>
  </div>

  <div class="statusbar"><span>9:41</span><span style="display:flex;gap:6px;align-items:center"><svg width="18" height="12" viewBox="0 0 18 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1.5 9v1.5M5.5 7v3.5M9.5 5v5.5M13.5 3v7.5"/></svg><svg width="16" height="12" viewBox="0 0 16 12" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M1.5 4.5a10 10 0 0 1 13 0M4 7a6.5 6.5 0 0 1 8 0M6.5 9.5a3 3 0 0 1 3 0"/></svg><svg width="25" height="12" viewBox="0 0 25 12" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="1.5" width="20" height="9" rx="2.5"/><rect x="3" y="3.5" width="16" height="5" rx="1" fill="currentColor" stroke="none"/><path d="M23 4.5v3" stroke-linecap="round"/></svg></span></div>

  <div class="push-header">
    <button class="back-btn" aria-label="Volver">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 8 12l7 7"/></svg>
    </button>
    <span class="eyebrow">COMPATIBILIDAD</span>
  </div>

  <main>

    <div class="titulo-acto">
      <h1 class="h-serif--title">El cielo entre dos personas</h1>
      <p class="voice">¿Con quién quieres mirar el cielo?</p>
    </div>

    <div class="franja">
      <span class="ui-xs franja-label">Tú</span>
      <div class="franja-fila">
        <div class="chip chip--on">
          <span class="avatar-ini avatar-ini--on">G</span>
          Gio
        </div>
        <span class="ui-xs">Tu cielo ya está aquí.</span>
      </div>
    </div>

    <div class="separador separador-puente">
      <b></b>
      <span class="glifo">☍︎</span>
      <b></b>
    </div>

    <div class="franja">
      <span class="ui-xs franja-label">Y…</span>
      <div class="franja-fila">
        <div class="chip chip--on">
          <span class="avatar-ini avatar-ini--on">V</span>
          Valentina
        </div>
        <div class="chip">
          <span class="avatar-ini avatar-ini--off">M</span>
          Mateo
        </div>
        <div class="chip chip--dashed">+ Añadir</div>
      </div>
    </div>

    <div class="vinculos">
      <span class="eyebrow">Vínculos recientes</span>
      <div class="vinculos-rows">
        <button class="vinculo-row" type="button">
          <span class="vinculo-info">
            <span class="vinculo-nombres"><b>G &amp; V</b> — Gio &amp; Valentina</span>
            <span class="vinculo-meta">hace 3 días</span>
          </span>
          <span class="vinculo-score">82</span>
        </button>
        <button class="vinculo-row" type="button">
          <span class="vinculo-info">
            <span class="vinculo-nombres"><b>G &amp; M</b> — Gio &amp; Mateo</span>
            <span class="vinculo-meta">hace 2 semanas</span>
          </span>
          <span class="vinculo-score">67</span>
        </button>
      </div>
    </div>

    <div class="cierre">
      <p class="ui-xs nota-cierre">La sinastría no dice si encajan, sino dónde se reflejan.</p>
      <button class="cta">Ver el vínculo</button>
    </div>

  </main>

  <div class="homebar"></div>

</div>
</body></html>
